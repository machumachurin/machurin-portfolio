<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和風・雅 (Wa / Zen) | Machurin Concept Hub</title>
    <link rel="stylesheet" href="../../assets/css/concepts/concept-base.css">
    <link rel="stylesheet" href="../../assets/css/wa.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 全画面背景画像 -->
    <img src="../../assets/img/wa_bg.png" alt="Wa Background" class="concept-bg gallery-img"
        style="filter: grayscale(30%) contrast(1.1); opacity: 0.6;">

    <nav class="top-nav fade-in delay-1">
        <a href="../../index.html" class="back-btn"><i class="ph ph-arrow-left"></i> 戻る (RETURN)</a>
        <button class="theme-toggle" aria-label="Toggle Light/Dark Theme" onclick="document.documentElement.classList.toggle('auto-invert')">
            <i class="ph ph-sun-dim"></i>
        </button>
    </nav>

    <main class="concept-container">
        <header class="concept-header fade-in">
            <h1 class="concept-title"
                style="font-family: 'Noto Serif JP', serif; font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: 0.3em; margin: 0; color: #e8e8e8; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);">
                静寂と雅</h1>
            <p class="concept-subtitle"
                style="font-family: 'Noto Serif JP', serif; letter-spacing: 0.4em; color: #888888; font-weight: 300; margin-top: 5px;">
                CONCEPT: ZEN / MIYABI</p>
            <div class="separator-line" style="background: #da291c;"></div>
        </header>

        <p class="lyric-text fade-in delay-2"
            style="font-family: 'Noto Serif JP', serif; color: #e8e8e8; text-shadow: 0 2px 10px rgba(0,0,0,0.8);">
            墨の香り漂う、研ぎ澄まされた空間。<br>
            静寂の中にこそ、真の美しさが宿る。
        </p>

        <section class="desc-box fade-in delay-3 wa-card" style="align-items: center; text-align: center;">
            <h2 class="card-title"
                style="font-family: 'Noto Serif JP', serif; font-size: 1.2rem; font-weight: 400; letter-spacing: 0.2em; color: #c5a059; margin-top: 0; margin-bottom: 20px;">
                <i class="ph-fill ph-flower-lotus" style="color: #da291c;"></i> Concept Description
            </h2>
            <p class="wa-desc"
                style="font-family: 'Noto Serif JP', serif; font-size: clamp(0.85rem, 1.2vw, 0.95rem); line-height: 1.6; color: #e8e8e8; opacity: 0.9; margin: 0;">
                墨汁の深い黒と、和紙の温もりを感じる「Wa / Zen（和風・雅）」のデザインサンプルです。<br><br>
                朱色の印が静寂の中に灯るような、美しく研ぎ澄まされた「和」の雰囲気を追求しています。<br>
                和風のタイポグラフィと、水墨画のような表現を用いています。<br><br>
                <strong>【おすすめのクリエイター】</strong><br>
                和風の世界観、怪談や朗読、日本文化を重視する人などに最適です。
            </p>
            <div class="wa-links">
                <a href="#" class="wa-btn"><i class="ph-fill ph-moon"></i></a>
                <a href="#" class="wa-btn"><i class="ph-fill ph-wind"></i></a>
                <a href="#" class="wa-btn"><i class="ph-fill ph-leaf"></i></a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in, .fade-up, .fade-left').forEach(el => observer.observe(el));
        });
    </script>
</body>

</html>
