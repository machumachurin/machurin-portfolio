<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antique / Steampunk | Machurin Concept Hub</title>
    <!-- Phospor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 雰囲気のためのフォント -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/concepts/concept-base.css">
    <link rel="stylesheet" href="../../assets/css/antique.css">
</head>

<body>
    <!-- 全画面背景画像 -->
    <img src="../../assets/img/antique-bg.png" alt="Antique Background" class="concept-bg gallery-img"
        style="filter: sepia(0.6) contrast(1.2); opacity: 0.25;">

    <!-- 歯車のアニメーション装飾 -->
    <i class="ph-fill ph-gear gear gear-1"></i>
    <i class="ph-fill ph-gear gear gear-2"></i>

    <nav class="top-nav fade-in delay-1">
        <a href="../../index.html" class="back-btn"><i class="ph ph-arrow-left"></i> Return to Archives</a>
        <button class="theme-toggle" aria-label="Toggle Light/Dark Theme"
            onclick="document.documentElement.classList.toggle('auto-invert')">
            <i class="ph ph-sun-dim"></i>
        </button>
    </nav>

    <main class="concept-container antique-container fade-in">
        <header class="antique-header concept-header">
            <h1 class="antique-title concept-title">Chronicle<br>of<br>Machurin</h1>
            <p class="antique-subtitle concept-subtitle">〜 失われた記録と刻まれる時間 〜</p>
        </header>

        <div class="lyric-container fade-in delay-2"
            style="background: rgba(244, 236, 216, 0.85); display: inline-block; padding: 15px 30px; border-radius: 5px; border: 1px solid var(--antique-gold); margin: 0 auto 20px auto; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); text-align: center;">
            <p class="lyric-text"
                style="font-family: var(--font-serif); font-weight: bold; color: var(--antique-ink); margin: 0; text-shadow: none;">
                黄昏の書庫に眠る、時の記憶。<br>
                歯車が回る音だけが、真実を囁く。
            </p>
        </div>

        <section class="desc-box fade-in delay-3"
            style="background: rgba(244, 236, 216, 0.85); border: 2px solid var(--antique-gold); border-radius: 5px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);">
            <h2 class="section-title" style="margin-top: 0; margin-bottom: 5px;">Concept Description</h2>
            <p class="story-text" style="color: var(--antique-ink); font-weight: 500;">
                セピア色の羊皮紙と、静かに時を刻む歯車に包まれる「Antique（アンティーク）」のデザインサンプルです。<br><br>
                古い洋書のようなセリフ体（明朝体）と、滲んだインク色を基調とした重厚なデザインで「クラシカルで没入感のある」世界観を追求しています。<br><br>
                <strong>【おすすめのクリエイター】</strong><br>
                TRPGのKP、Vティーク系、教養・考察・朗読系を重視する人などに最適です。
            </p>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" style="font-size: 1.5rem; margin: 0 10px; color: var(--antique-ink);"><i
                        class="ph-fill ph-twitter-logo"></i></a>
                <a href="#" style="font-size: 1.5rem; margin: 0 10px; color: var(--antique-ink);"><i
                        class="ph-fill ph-youtube-logo"></i></a>
                <a href="#" style="font-size: 1.5rem; margin: 0 10px; color: var(--antique-ink);"><i
                        class="ph-fill ph-book-open"></i></a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 古書風スクロールフェード（オプション）
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 2s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
                document.querySelectorAll('.fade-in').forEach(el => {
                    el.classList.add('visible');
                });
            }, 100);
        });
    </script>
</body>

</html>
