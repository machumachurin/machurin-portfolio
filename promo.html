<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Promo Screen Maker</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/hub.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* スクロールバー非表示 */
            font-family: var(--font-body);
        }

        /* 1200x675 は X(Twitter) のアスペクト比 16:9 の最適解 */
        .promo-canvas {
            width: 1200px;
            height: 675px;
            background: #0a0c12;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 100px rgba(6, 182, 212, 0.1);
            display: flex;
            flex-direction: column;
        }

        /* -----------------------
           内部レイアウト
        ----------------------- */
        .content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 30px 40px;
            /* 余白調整 */
            box-sizing: border-box;
        }

        /* ヘッダー部（キャッチコピー） */
        .promo-header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeIn 1s ease;
        }

        .promo-title {
            font-family: var(--font-body);
            font-size: 2.1rem;
            font-weight: 400;
            color: #fff;
            letter-spacing: 5px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .promo-subtitle {
            font-family: var(--font-body);
            font-size: 1.05rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin: 0;
            font-weight: 300;
        }

        /* 中央 2x2 グリッド（iframeサムネイル） */
        .site-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            flex: 1;
            margin-bottom: 25px;
        }

        .site-frame-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease both;
        }

        .site-frame-wrapper:nth-child(1) {
            animation-delay: 0.1s;
            border-color: rgba(255, 105, 180, 0.3);
        }

        /* Poji */
        .site-frame-wrapper:nth-child(2) {
            animation-delay: 0.2s;
            border-color: rgba(139, 92, 246, 0.3);
        }

        /* Urameshi */
        .site-frame-wrapper:nth-child(3) {
            animation-delay: 0.3s;
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* Aiyueni */
        .site-frame-wrapper:nth-child(4) {
            animation-delay: 0.4s;
            border-color: rgba(220, 38, 38, 0.3);
        }

        /* Saiki */

        /* iframeを200%に拡大し、scale(0.5)で縮小することで高画質なサムネイルを実現 */
        iframe {
            width: 200%;
            height: 200%;
            transform: scale(0.5);
            transform-origin: top left;
            border: none;
            /* iframe内のマウスイベントを無効化し、自動再生等だけを残す */
            pointer-events: none;
        }

        /* サイト名ラベル */
        .site-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 18px;
            border-radius: 30px;
            color: #fff;
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ボトム部（料金表示） */
        .pricing-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            /* 丸みのあるバー */
            padding: 15px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease;
        }

        .price-item {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .price-name {
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .price-value {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--primary-color, #06b6d4);
        }

        .price-tax {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 撮影用ヘルパーUI（スクショには写らない位置） */
        .screen-helper {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 182, 212, 0.2);
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(6, 182, 212, 0.5);
            font-family: sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        /* 簡易アニメーション */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="screen-helper">📸 この大きな四角枠（1200x675）をスクリーンショットして、Xの画像として投稿してください</div>

    <!-- 16:9 画角のキャンバス -->
    <div class="promo-canvas" id="canvas">
        <!-- 背景エフェクト（hub.cssのもの） -->
        <div class="ambient-background">
            <div class="glow-orb"
                style="top: -10%; left: -10%; background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);">
            </div>
            <div class="glow-orb"
                style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);">
            </div>
        </div>

        <div class="content-layer">
            <header class="promo-header">
                <h1 class="promo-title">あなたの世界観を、ブラウザ上に完全再現</h1>
                <!-- リーチ重視のためのキャッチコピー -->
                <p class="promo-subtitle">Wixやlit.linkでは実現不可能な演出を持つ、唯一無二の個人サイト・ハブを構築。</p>
            </header>

            <div class="site-grid">
                <!-- 1. ポジポジ子 (Y2K) -->
                <div class="site-frame-wrapper">
                    <iframe src="creators/poji/index.html"></iframe>
                    <div class="site-label">Y2K POP / POJIPOZIKO</div>
                </div>
                <!-- 2. うらめし (Cyberpunk) -->
                <div class="site-frame-wrapper">
                    <iframe src="creators/urameshi/index.html"></iframe>
                    <div class="site-label">CYBERPUNK / URAMESHI</div>
                </div>
                <!-- 3. 愛ゆえに (Glassmorphism) -->
                <div class="site-frame-wrapper">
                    <iframe src="creators/aiyueni/index.html"></iframe>
                    <div class="site-label">GLASSMORPHISM / AIYUENI</div>
                </div>
                <!-- 4. 赤峰さいき (Brutalism) -->
                <div class="site-frame-wrapper">
                    <iframe src="creators/saiki/index.html"></iframe>
                    <div class="site-label">BRUTALISM / AKAMINE SAIKI</div>
                </div>
            </div>

            <!-- 料金バー -->
            <div class="pricing-bar">
                <div class="price-item">
                    <span class="price-name">ベースプラン</span>
                    <span class="price-value">¥25,000<span class="price-tax">〜</span></span>
                </div>
                <!-- 仕切り -->
                <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
                <div class="price-item">
                    <span class="price-name">オリジナルプラン</span>
                    <span class="price-value">¥50,000<span class="price-tax">〜</span></span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
